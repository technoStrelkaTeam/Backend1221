services:
  api:
    build: ./api
    container_name: 1221systems-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      OLLAMA_HOST: http://ollama:11434
    env_file:
      - .env
    ports:
      - 8000:8000

  db:
    image: postgres:17
    container_name: 1221systems-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER}", "-d", "${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - 5432:5432

  ollama:
    image: ollama/ollama:latest
    container_name: 1221systems-ollama
    restart: unless-stopped
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    privileged: true
    environment:
      OLLAMA_HOST: 0.0.0.0
      OLLAMA_VULKAN: 1
      HSA_OVERRIDE_GFX_VERSION: 9.0.0
      OLLAMA_FLASH_ATTENTION: 1
      OLLAMA_KV_CACHE_TYPE: q8_0
    volumes:
      - ollama-data:/root/.ollama

volumes:
  db-data:
  ollama-data: